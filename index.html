<!DOCTYPE html>
<html lang="en" ng-app="SmartHomeApp">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SmartHome Service Booking System</title>
  <meta name="description" content="Book trusted home services — Electrical, Plumbing, AC, Cleaning, Carpentry and more."/>

  <!-- Google Fonts CDN -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <!-- AngularJS 1.8.3 CDN -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>

  <!-- App CSS (File 2 of 3) -->
  <link rel="stylesheet" href="styles.css">
</head>

<body ng-controller="AppCtrl">

<!-- ======================== NAVBAR ======================== -->
<nav class="navbar" ng-show="isLoggedIn()">
  <div class="nav-brand">
    <span class="brand-icon">🏠</span>
    <h1>Smart<span>Home</span></h1>
  </div>
  <ul class="nav-links">
    <li><a href="#!/home"    ng-class="{'active': currentPath=='/home'}">🏠 Dashboard</a></li>
    <li><a href="#!/booking" ng-class="{'active': currentPath=='/booking'}">📋 Book Service</a></li>
    <li><a href="#!/history" ng-class="{'active': currentPath=='/history'}" class="hide-sm">📁 My Bookings</a></li>
    <li><a href="#!/reviews" ng-class="{'active': currentPath=='/reviews'}" class="hide-sm">⭐ Reviews</a></li>
    <li><a href="#!/profile" ng-class="{'active': currentPath=='/profile'}" class="hide-sm">👤 Profile</a></li>
  </ul>
  <div class="nav-user">
    <div class="user-chip">
      <div class="avatar">{{initials()}}</div>
      <span ng-bind="currentUser().name"></span>
    </div>
    <button class="logout-btn" ng-click="logout()">Logout</button>
  </div>
</nav>

<!-- ======================== ROUTER OUTLET ======================== -->
<div ng-view></div>

<!-- =================================================================
     PAGE TEMPLATES  (inline ng-template — no extra HTML files)
     ================================================================= -->

<!-- ===== LOGIN / REGISTER ===== -->
<script type="text/ng-template" id="login.html">
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🏠</div>
      <h2>SmartHome Services</h2>
      <p>Book trusted home services, anytime.</p>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab" ng-class="{'active': tab==='login'}"    ng-click="switchTab('login')">Sign In</div>
      <div class="auth-tab" ng-class="{'active': tab==='register'}" ng-click="switchTab('register')">Register</div>
    </div>

    <!-- Login Form -->
    <div ng-if="tab==='login'">
      <form name="lf" novalidate ng-submit="doLogin(lf)">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" ng-model="lf.email" name="email" required placeholder="you@example.com"/>
          <span class="err-msg" ng-show="invalid(lf,'email')">Enter a valid email.</span>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" ng-model="lf.password" name="password" required minlength="6" placeholder="Min. 6 characters"/>
          <span class="err-msg" ng-show="invalid(lf,'password')">Password is required (min 6 chars).</span>
        </div>
        <span class="err-msg" ng-show="err">{{err}}</span>
        <div class="mt-4">
          <button type="submit" class="btn btn-primary btn-full">Sign In →</button>
        </div>
        <p style="text-align:center;font-size:12px;color:#94a3b8;margin-top:12px">
          Demo: demo@home.com / 123456
        </p>
      </form>
    </div>

    <!-- Register Form -->
    <div ng-if="tab==='register'">
      <form name="rf" novalidate ng-submit="doRegister(rf)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" ng-model="rf.name" name="name" required placeholder="Your full name"/>
          <span class="err-msg" ng-show="invalid(rf,'name')">Name is required.</span>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Email</label>
            <input type="email" ng-model="rf.email" name="email" required placeholder="you@email.com"/>
            <span class="err-msg" ng-show="invalid(rf,'email')">Valid email needed.</span>
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" ng-model="rf.phone" name="phone" required pattern="[6-9][0-9]{9}" placeholder="10-digit mobile"/>
            <span class="err-msg" ng-show="invalid(rf,'phone')">Valid mobile needed.</span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Password</label>
            <input type="password" ng-model="rf.password" name="password" required minlength="6" placeholder="Min. 6 chars"/>
            <span class="err-msg" ng-show="invalid(rf,'password')">Min. 6 characters.</span>
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" ng-model="rf.confirm" name="confirm" required placeholder="Re-enter"/>
          </div>
        </div>
        <span class="err-msg" ng-show="err">{{err}}</span>
        <div class="ok-msg" ng-show="done">✓ Account created! Redirecting to login…</div>
        <div class="mt-4">
          <button type="submit" class="btn btn-primary btn-full">Create Account →</button>
        </div>
      </form>
    </div>
  </div>
</div>
</script>

<!-- ===== DASHBOARD / HOME ===== -->
<script type="text/ng-template" id="home.html">
<div class="page">
  <!-- Welcome banner -->
  <div class="welcome-banner">
    <div>
      <h2>Welcome back, {{user.name}}! 👋</h2>
      <p>What service do you need today? Book in under 2 minutes.</p>
      <div class="mt-4">
        <a href="#!/booking" class="btn btn-accent">+ Book a Service</a>
      </div>
    </div>
    <div class="banner-icon">🏠</div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="st-num" style="color:#1B3A6B">{{totalBookings}}</div>
      <div class="st-lbl">Total Bookings</div>
    </div>
    <div class="stat-card">
      <div class="st-num" style="color:#F59E0B">{{pendingBookings}}</div>
      <div class="st-lbl">Pending</div>
    </div>
    <div class="stat-card">
      <div class="st-num" style="color:#10B981">{{completedBookings}}</div>
      <div class="st-lbl">Completed</div>
    </div>
    <div class="stat-card">
      <div class="st-num" style="color:#00BCD4">8</div>
      <div class="st-lbl">Service Categories</div>
    </div>
  </div>

  <!-- Categories -->
  <div class="section-hdr">
    <h3>Our Services</h3>
    <a href="#!/booking">View all →</a>
  </div>
  <div class="cat-grid">
    <div class="cat-card" ng-repeat="cat in categories" ng-click="bookCategory(cat.id)">
      <div class="cat-icon" ng-style="{'background': cat.color}">{{cat.icon}}</div>
      <h4>{{cat.id}}</h4>
      <p>{{cat.sub}}</p>
    </div>
  </div>

  <!-- Recent Bookings -->
  <div class="section-hdr">
    <h3>Recent Bookings</h3>
    <a href="#!/history">See all →</a>
  </div>
  <div ng-if="recentBookings.length === 0" class="empty-state" style="padding:32px">
    <p>No bookings yet. <a href="#!/booking" style="color:#1B3A6B;font-weight:600">Book your first service →</a></p>
  </div>
  <div ng-repeat="b in recentBookings" class="booking-card">
    <div class="bc-icon" style="background:#EEF2FF;font-size:26px">{{b.categoryIcon}}</div>
    <div class="bc-body">
      <h4>{{b.service}}</h4>
      <div class="bc-meta">
        <span>📅 {{b.date}}</span>
        <span>⏰ {{b.time}}</span>
        <span>₹{{b.price}}</span>
      </div>
    </div>
    <div class="bc-actions">
      <span class="badge badge-{{b.status}}">{{b.status}}</span>
    </div>
  </div>
</div>
</script>

<!-- ===== BOOKING ===== -->
<script type="text/ng-template" id="booking.html">
<div class="page">
  <div class="page-title">Book a Service</div>
  <p class="page-sub">Choose a category and service, then schedule your appointment.</p>

  <!-- Step bar -->
  <div class="step-bar">
    <div class="step" ng-class="{'active': step===1, 'done': step>1}">
      <div class="s-num">{{step>1 ? '✓' : '1'}}</div>
      <span class="s-label">Choose Service</span>
    </div>
    <div class="step" ng-class="{'active': step===2, 'done': step>2}">
      <div class="s-num">{{step>2 ? '✓' : '2'}}</div>
      <span class="s-label">Schedule</span>
    </div>
    <div class="step" ng-class="{'active': step===3}">
      <div class="s-num">3</div>
      <span class="s-label">Confirmed</span>
    </div>
  </div>

  <!-- Step 1 — Select Category + Service -->
  <div ng-if="step===1">
    <div class="booking-body">
      <div class="booking-main">
        <h3 style="font-size:16px;margin-bottom:16px;color:#1B3A6B">Step 1: Select Category &amp; Service</h3>

        <!-- Category Grid -->
        <div class="cat-grid" style="grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px">
          <div class="cat-card" ng-repeat="cat in categories"
               ng-class="{'selected': sel.category===cat.id}"
               ng-click="selectCategory(cat.id)"
               style="padding:14px 10px">
            <div class="cat-icon" style="width:44px;height:44px;font-size:22px;border-radius:10px"
                 ng-style="{'background': cat.color}">{{cat.icon}}</div>
            <h4 style="font-size:12px;margin-top:6px">{{cat.id}}</h4>
          </div>
        </div>

        <!-- Service List for selected category -->
        <div ng-if="sel.category">
          <h4 style="font-size:14px;font-weight:600;margin-bottom:12px;color:#64748B;text-transform:uppercase;letter-spacing:.04em">Select Service</h4>
          <div class="svc-list" ng-repeat="cat in categories" ng-if="cat.id===sel.category">
            <div class="svc-item" ng-repeat="svc in cat.services"
                 ng-class="{'selected': sel.service===svc}"
                 ng-click="selectService(svc)">
              <div class="svc-dot"></div>
              <span>{{svc}}</span>
              <span style="margin-left:auto;font-size:12px;color:#64748B;font-weight:600">₹{{getPrice()}}</span>
            </div>
          </div>
        </div>
        <div ng-if="!sel.category" style="text-align:center;padding:32px;color:#94a3b8">
          <div style="font-size:40px;margin-bottom:10px">👆</div>
          <p>Select a category above to see available services</p>
        </div>

        <div style="margin-top:20px">
          <button class="btn btn-primary" ng-click="goStep2()" ng-disabled="!sel.category || !sel.service">
            Next: Schedule Appointment →
          </button>
        </div>
      </div>

      <!-- Summary sidebar -->
      <div class="booking-summary">
        <h4>Booking Summary</h4>
        <div class="sum-row"><span class="sr-key">Category</span><span class="sr-val">{{sel.category || '—'}}</span></div>
        <div class="sum-row"><span class="sr-key">Service</span><span class="sr-val">{{sel.service || '—'}}</span></div>
        <div class="sum-row"><span class="sr-key">Est. Price</span><span class="sr-val" style="color:#1B3A6B;font-size:16px">₹{{sel.service ? getPrice() : '0'}}</span></div>
        <p style="font-size:11px;color:#94a3b8;margin-top:12px">* Final price may vary based on site inspection.</p>
      </div>
    </div>
  </div>

  <!-- Step 2 — Schedule -->
  <div ng-if="step===2">
    <div class="booking-body">
      <div class="booking-main">
        <h3 style="font-size:16px;margin-bottom:20px;color:#1B3A6B">Step 2: Schedule &amp; Your Details</h3>
        <form name="bf" novalidate ng-submit="submitBooking(bf)">
          <div class="form-row">
            <div class="form-group">
              <label>Preferred Date</label>
              <input type="date" ng-model="sel.date" name="date" required
                     ng-attr-min="{{minDate}}"/>
              <span class="err-msg" ng-show="sub && !sel.date">Please select a date.</span>
            </div>
            <div class="form-group">
              <label>Preferred Time</label>
              <select ng-model="sel.time" name="time" required>
                <option ng-repeat="t in times" value="{{t}}">{{t}}</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Service Address</label>
            <input type="text" ng-model="sel.address" name="address" required placeholder="Full address with flat no., area, city"/>
            <span class="err-msg" ng-show="sub && bf.address.$invalid">Address is required.</span>
          </div>
          <div class="form-group">
            <label>Additional Notes (optional)</label>
            <textarea ng-model="sel.notes" rows="3" placeholder="Describe the issue or any special instructions…" style="resize:vertical"></textarea>
          </div>
          <div style="display:flex;gap:12px;margin-top:8px">
            <button type="button" class="btn btn-outline" ng-click="goStep1()">← Back</button>
            <button type="submit" class="btn btn-primary">Confirm Booking ✓</button>
          </div>
        </form>
      </div>

      <div class="booking-summary">
        <h4>Booking Summary</h4>
        <div class="sum-row"><span class="sr-key">Category</span><span class="sr-val">{{getCategoryIcon()}} {{sel.category}}</span></div>
        <div class="sum-row"><span class="sr-key">Service</span><span class="sr-val">{{sel.service}}</span></div>
        <div class="sum-row"><span class="sr-key">Date</span><span class="sr-val">{{sel.date || '—'}}</span></div>
        <div class="sum-row"><span class="sr-key">Time</span><span class="sr-val">{{sel.time}}</span></div>
        <div class="sum-row" style="margin-top:8px;padding-top:12px;border-top:2px solid #e2e8f0">
          <span class="sr-key" style="font-weight:700">Total</span>
          <span class="sr-val" style="color:#1B3A6B;font-size:18px;font-weight:700">₹{{getPrice()}}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Step 3 — Confirmed -->
  <div ng-if="step===3">
    <div class="booking-main" style="text-align:center;padding:52px 32px;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);border:1px solid #e2e8f0;max-width:560px;margin:0 auto">
      <div style="font-size:72px;margin-bottom:16px">🎉</div>
      <h3 style="font-size:26px;font-weight:700;color:#10B981;margin-bottom:10px">Booking Confirmed!</h3>
      <p style="font-size:14px;color:#64748B;max-width:360px;margin:0 auto 28px;line-height:1.7">
        Your <strong>{{sel.service}}</strong> service has been booked for <strong>{{sel.date}}</strong> at <strong>{{sel.time}}</strong>. A technician will contact you shortly.
      </p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <a href="#!/history" class="btn btn-primary">View My Bookings</a>
        <button class="btn btn-outline" ng-click="bookAgain()">Book Another Service</button>
      </div>
    </div>
  </div>
</div>
</script>

<!-- ===== HISTORY ===== -->
<script type="text/ng-template" id="history.html">
<div class="page">
  <div class="page-title">My Bookings</div>
  <p class="page-sub">Track, manage and review all your service appointments.</p>

  <!-- Filter row -->
  <div class="filter-row">
    <button class="f-btn" ng-repeat="f in statusFilters"
            ng-class="{'active': filter===f.key}"
            ng-click="setFilter(f.key)">{{f.label}}</button>
  </div>

  <!-- Booking list -->
  <div ng-if="filtered().length === 0" class="empty-state">
    <div class="es-icon">📭</div>
    <h3>No bookings found</h3>
    <p ng-if="filter==='all'">You haven't booked any services yet.</p>
    <p ng-if="filter!=='all'">No {{filter}} bookings.</p>
    <a href="#!/booking" class="btn btn-primary">Book a Service →</a>
  </div>

  <div ng-repeat="b in filtered()" class="booking-card">
    <div class="bc-icon" ng-style="{'background':'#EEF2FF'}">{{b.categoryIcon}}</div>
    <div class="bc-body">
      <h4>{{b.service}}</h4>
      <div class="bc-meta">
        <span>🏷️ {{b.category}}</span>
        <span>📅 {{b.date}}</span>
        <span>⏰ {{b.time}}</span>
      </div>
      <div class="bc-meta">
        <span>📍 {{b.address}}</span>
        <span style="font-weight:700;color:#1B3A6B">₹{{b.price}}</span>
      </div>
      <div ng-show="b.review" style="font-size:12px;color:#64748B;margin-top:4px;font-style:italic">"{{b.review}}"</div>
    </div>
    <div class="bc-actions">
      <span class="badge badge-{{b.status}}">{{b.status}}</span>
      <button class="btn btn-danger btn-sm"
              ng-show="b.status==='pending'"
              ng-click="cancel(b)">Cancel</button>
      <a href="#!/reviews" class="btn btn-accent btn-sm"
         ng-show="b.status==='completed' && b.rating===0">Rate ⭐</a>
      <div ng-show="b.rating>0" style="font-size:13px;color:#F59E0B;text-align:center">
        <div>{{b.rating}}/5 ★</div>
      </div>
    </div>
  </div>
</div>
</script>

<!-- ===== PROFILE ===== -->
<script type="text/ng-template" id="profile.html">
<div class="page">
  <div class="page-title">My Profile</div>
  <p class="page-sub">Manage your personal information and account settings.</p>

  <div class="profile-wrap">
    <!-- Profile card (left) -->
    <div class="profile-card">
      <div class="profile-avatar">{{initials()}}</div>
      <h3>{{user.name}}</h3>
      <p class="p-email">{{user.email}}</p>
      <div class="profile-stat">
        <div class="pstat"><div class="pn">{{totalB}}</div><div class="pl">Bookings</div></div>
        <div class="pstat"><div class="pn">{{completedB}}</div><div class="pl">Done</div></div>
        <div class="pstat"><div class="pn">{{avgRating}}</div><div class="pl">Avg ★</div></div>
      </div>
    </div>

    <!-- Info / Edit form (right) -->
    <div class="profile-info">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #e2e8f0">
        <h3 style="margin:0;border:none;padding:0">Account Information</h3>
        <button class="btn btn-outline btn-sm" ng-show="!editing" ng-click="startEdit()">✏️ Edit</button>
        <div ng-show="editing" style="display:flex;gap:8px">
          <button class="btn btn-outline btn-sm" ng-click="cancelEdit()">Cancel</button>
        </div>
      </div>

      <div class="ok-msg" ng-show="saved">✓ Profile updated successfully!</div>

      <form name="pf" novalidate ng-submit="saveProfile(pf)">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" ng-model="user.name" name="name" required ng-disabled="!editing"/>
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" ng-model="user.phone" name="phone" ng-disabled="!editing" placeholder="10-digit mobile"/>
          </div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" ng-model="user.email" name="email" required ng-disabled="!editing"/>
        </div>
        <div class="form-group">
          <label>Default Service Address</label>
          <textarea ng-model="user.address" rows="2" ng-disabled="!editing" placeholder="Your home address (used for bookings)"></textarea>
        </div>
        <div ng-show="editing">
          <button type="submit" class="btn btn-primary">Save Changes ✓</button>
        </div>
      </form>

      <!-- Account Info -->
      <div style="margin-top:24px;padding-top:20px;border-top:1px solid #e2e8f0">
        <p style="font-size:12px;color:#94a3b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;font-weight:600">Account Actions</p>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <a href="#!/history" class="btn btn-outline btn-sm">📁 My Bookings</a>
          <a href="#!/reviews" class="btn btn-outline btn-sm">⭐ My Reviews</a>
          <button class="btn btn-danger btn-sm" ng-click="$parent.logout()">Logout</button>
        </div>
      </div>
    </div>
  </div>
</div>
</script>

<!-- ===== REVIEWS ===== -->
<script type="text/ng-template" id="reviews.html">
<div class="page">
  <div class="page-title">Ratings &amp; Reviews</div>
  <p class="page-sub">Share your experience — your feedback helps us improve.</p>

  <!-- Rate pending services -->
  <div class="review-section" ng-show="toRate.length > 0">
    <h3>⭐ Rate Your Completed Services</h3>
    <div class="rate-card" ng-repeat="b in toRate">
      <h4>{{b.categoryIcon}} {{b.service}}</h4>
      <p>Completed on {{b.date}} &nbsp;·&nbsp; ₹{{b.price}}</p>

      <!-- Star rating -->
      <div class="stars">
        <span class="star" ng-repeat="s in starsArr"
              ng-class="starClass(b.id, s)"
              ng-mouseenter="setHover(b.id, s)"
              ng-mouseleave="clearHover(b.id)"
              ng-click="setRating(b.id, s)">★</span>
      </div>
      <div style="font-size:12px;color:#64748B;margin-bottom:10px" ng-show="ratings[b.id]">
        You rated: <strong>{{ratings[b.id]}} / 5 ★</strong>
      </div>

      <div class="form-group">
        <textarea ng-model="texts[b.id]" rows="2" placeholder="Write your review (optional)…"
                  style="border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 12px;width:100%;font-size:13px;resize:vertical"></textarea>
      </div>
      <button class="btn btn-accent btn-sm" ng-click="submitReview(b)">Submit Review →</button>
    </div>
  </div>

  <!-- No pending reviews -->
  <div ng-show="toRate.length === 0" class="card" style="padding:24px;margin-bottom:28px;text-align:center;color:#94a3b8">
    <span style="font-size:32px">✅</span>
    <p style="margin-top:8px;font-size:14px">All completed services have been reviewed. 
      <a href="#!/booking" style="color:#1B3A6B;font-weight:600">Book a new service →</a>
    </p>
  </div>

  <!-- All reviews -->
  <div class="review-section">
    <h3>📋 All Reviews</h3>

    <div ng-if="reviews.length === 0" class="empty-state" style="padding:32px">
      <p style="color:#94a3b8">No reviews yet. Complete a service and rate it!</p>
    </div>

    <div class="review-card" ng-repeat="r in reviews">
      <div class="rc-top">
        <h4>{{r.categoryIcon}} {{r.service}}</h4>
        <span class="rc-date">{{r.reviewDate || r.date}}</span>
      </div>
      <div class="rc-stars">
        <span ng-repeat="s in starsArr">{{s <= r.rating ? '★' : '☆'}}</span>
        <span style="font-size:13px;color:#64748B;margin-left:6px">{{r.rating}}/5</span>
      </div>
      <p class="rc-text" ng-show="r.review">"{{r.review}}"</p>
      <p class="rc-text" ng-show="!r.review" style="font-style:italic">No written review.</p>
      <p class="rc-by">{{r.category}} &nbsp;·&nbsp; ₹{{r.price}}</p>
    </div>
  </div>
</div>
</script>

<!-- App JS (File 3 of 3) -->
<script src="app.js"></script>
</body>
</html>
